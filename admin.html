<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Alpha Nex</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--gold-l:#f0c060;--gold-d:#8a6a20;--r:14px;--card:rgba(255,255,255,.025)}
html,body{background:#050505;color:#fff;font-family:'Inter',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.top{position:sticky;top:0;z-index:20;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(5,5,5,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(201,168,76,.12)}
.top b{font-family:'Cinzel',serif;font-weight:900;letter-spacing:1.5px;font-size:15px;background:linear-gradient(135deg,#c9a84c,#f5d07a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.top .out{font-size:11px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);padding:6px 12px;border-radius:20px;cursor:pointer;background:none;font-family:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}

/* Gate */
#gate{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:24px;background:#050505}
#gate.show{display:flex}
.gbox{width:100%;max-width:320px;text-align:center;background:linear-gradient(160deg,#0c0700,#070707 55%,#0c0700);border:1.5px solid var(--gold-d);border-radius:18px;padding:28px 22px}
.gbox h1{font-family:'Cinzel',serif;font-size:17px;margin-bottom:6px}
.gbox p{font-size:11.5px;color:rgba(255,255,255,.5);margin-bottom:16px}
.gbox input{width:100%;padding:13px;background:rgba(255,255,255,.03);border:1.5px solid rgba(201,168,76,.2);border-radius:10px;color:#fff;font-size:15px;text-align:center;letter-spacing:2px;outline:none;font-family:inherit}
.gbox input:focus{border-color:var(--gold)}
.gbox button{width:100%;margin-top:12px;padding:13px;border:none;border-radius:10px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));background-size:200%;animation:sh 2.6s linear infinite;color:#000;font-weight:800;cursor:pointer;font-family:inherit}
.gbox .e{display:none;color:#ff9a9a;font-size:11.5px;margin-top:10px}
@keyframes sh{0%{background-position:200%}100%{background-position:-200%}}

/* Warn worker */
.warn{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.28);color:var(--gold-l);border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.5;margin-bottom:16px;display:none}
.warn.show{display:block}

/* KPIs */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid rgba(201,168,76,.16);border-radius:14px;padding:16px}
.kpi .n{font-size:30px;font-weight:900;color:var(--gold-l);line-height:1;font-variant-numeric:tabular-nums}
.kpi .l{font-size:11px;color:rgba(255,255,255,.5);margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.kpi.live .n{color:#6ee7a8}
.dotlive{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6ee7a8;box-shadow:0 0 8px #6ee7a8;margin-right:6px;animation:pl 1.3s ease-in-out infinite;vertical-align:2px}
@keyframes pl{0%,100%{opacity:.4}50%{opacity:1}}

.panel{background:var(--card);border:1px solid rgba(201,168,76,.16);border-radius:16px;padding:16px;margin-bottom:16px}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-h .t{font-size:13px;font-weight:700;color:var(--gold-l);letter-spacing:.5px;text-transform:uppercase}
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg button{font-size:11px;padding:5px 9px;border-radius:8px;border:1px solid rgba(201,168,76,.2);background:none;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit}
.seg button.on{background:rgba(201,168,76,.18);color:var(--gold-l);border-color:var(--gold-d)}
.chart{width:100%;height:150px}
.bar{fill:url(#gg)}
.bar:hover{fill:var(--gold-l)}
.axl{fill:rgba(255,255,255,.35);font-size:8px;font-family:Inter}
.peak{font-size:11px;color:rgba(255,255,255,.5);margin-top:8px}
.peak b{color:var(--gold-l)}

.acts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.act{background:linear-gradient(160deg,#120c00,#0a0a0a);border:1.5px solid var(--gold-d);border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:transform .2s,border-color .2s}
.act:hover{transform:translateY(-2px);border-color:var(--gold)}
.act .ai{font-size:24px;margin-bottom:8px}
.act .at{font-size:13px;font-weight:700;color:#fff}
.act .as{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:2px}

/* Listes */
.back{font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;margin-bottom:12px;display:inline-block}
.back:hover{color:var(--gold-l)}
.list{display:flex;flex-direction:column;gap:9px}
.item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid rgba(201,168,76,.14);border-radius:12px;padding:12px 13px;cursor:pointer;transition:border-color .2s,background .2s}
.item:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.04)}
.av{width:40px;height:40px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(201,168,76,.16),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.2);font-size:15px;font-weight:800;color:var(--gold-l)}
.it-main{flex:1;min-width:0}
.it-main .a{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.it-main .b{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.it-r{font-size:10px;color:rgba(255,255,255,.4);text-align:right;flex-shrink:0}
.del{background:rgba(220,60,60,.12);border:1px solid rgba(220,60,60,.35);color:#ff9a9a;border-radius:8px;padding:7px 9px;font-size:11px;cursor:pointer;flex-shrink:0;font-family:inherit}
.del:hover{background:rgba(220,60,60,.25)}
.empty{text-align:center;color:rgba(255,255,255,.35);font-size:12.5px;padding:30px 10px}
.count{font-size:11px;color:rgba(255,255,255,.4)}

/* Détail */
.detail{background:var(--card);border:1px solid rgba(201,168,76,.16);border-radius:16px;padding:18px}
.detail h2{font-family:'Cinzel',serif;font-size:16px;margin-bottom:4px}
.detail .sub{font-size:11px;color:var(--gold-l);margin-bottom:16px}
.drow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12.5px}
.drow .k{color:rgba(255,255,255,.45)}
.drow .v{color:#fff;text-align:right;word-break:break-word}
.dsec{font-size:11px;font-weight:700;color:var(--gold-l);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px}
.spin{width:34px;height:34px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin:30px auto}
.mini-btn{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid rgba(201,168,76,.25);background:rgba(201,168,76,.08);color:var(--gold-l);cursor:pointer;font-family:inherit}
.conn-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.conn-row span:first-child{color:rgba(255,255,255,.72)}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.pill.ok{background:rgba(60,200,120,.14);color:#8fe0b0}
.pill.ko{background:rgba(220,60,60,.14);color:#ff9a9a}
.init-btn{width:100%;margin-top:12px;padding:12px;border:none;border-radius:10px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));background-size:200%;animation:sh 2.6s linear infinite;color:#000;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit}
.console{margin-top:12px;background:#050505;border:1px solid rgba(201,168,76,.18);border-radius:10px;padding:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;line-height:1.65;max-height:210px;overflow:auto}
.console .cl{white-space:pre-wrap;word-break:break-word}
.console .ok{color:#8fe0b0}.console .ko{color:#ff9a9a}.console .info{color:var(--gold-l)}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Gate code admin -->
<div id="gate">
  <div class="gbox">
    <h1>🔐 Espace admin</h1>
    <p>Entre ton code d'accès</p>
    <input type="password" id="gCode" placeholder="Code admin" autocomplete="off">
    <div class="e" id="gErr">Code incorrect.</div>
    <button id="gGo">Accéder →</button>
  </div>
</div>

<div class="top">
  <b>ALPHA NEX · ADMIN</b>
  <button class="out" id="logout">Quitter</button>
</div>

<div class="wrap" id="app"></div>

<script>
(function(){'use strict';

/* ══════════ CONFIG (identique aux autres pages) ══════════ */
var WORKER_URL = "https://late-silence-be46.strassweb67.workers.dev";   /* ton worker Cloudflare */
var ADMIN_CODE_FALLBACK = "Treza670";
var SUPABASE_URL = "https://pjvukiihkaqxrcqlrkpw.supabase.co";
var SUPABASE_ANON = "sb_publishable_h9IZ8_vABurU1544_D0q_A_79LGsqu1";
/* ═════════════════════════════════════════════════════════ */

var $=function(s){return document.querySelector(s);};
var app=$('#app');
var ADMIN=null; try{ ADMIN=sessionStorage.getItem('an_admin'); }catch(e){}
var workerOff = /VOTRE-WORKER/i.test(WORKER_URL);

/* ---------- Gate ---------- */
function showGate(){ $('#gate').classList.add('show'); var i=$('#gCode'); if(i){i.value='';setTimeout(function(){i.focus();},60);} }
function hideGate(){ $('#gate').classList.remove('show'); }
$('#gGo').addEventListener('click',doGate);
$('#gCode').addEventListener('keydown',function(e){ if(e.key==='Enter') doGate(); });
function doGate(){
  var code=($('#gCode').value||'').trim(); if(!code) return;
  function ok(){ ADMIN=code; try{sessionStorage.setItem('an_admin',code);}catch(e){} hideGate(); route(); }
  if(!workerOff){
    fetch(WORKER_URL.replace(/\/$/,'')+'/admin/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})})
      .then(function(r){return r.json();}).then(function(j){ if(j&&j.ok) ok(); else if(code===ADMIN_CODE_FALLBACK) ok(); else $('#gErr').style.display='block'; })
      .catch(function(){ if(code===ADMIN_CODE_FALLBACK) ok(); else $('#gErr').style.display='block'; });
  } else { if(code===ADMIN_CODE_FALLBACK) ok(); else $('#gErr').style.display='block'; }
}
$('#logout').addEventListener('click',function(){ try{sessionStorage.removeItem('an_admin');}catch(e){} window.location.href='index.html'; });

/* ---------- API worker ---------- */
function api(path){
  if(workerOff) return Promise.reject(new Error('no-worker'));
  return fetch(WORKER_URL.replace(/\/$/,'')+path,{headers:{'x-admin-code':ADMIN||''}})
    .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); });
}
function apiPost(path,body){
  if(workerOff) return Promise.reject(new Error('no-worker'));
  return fetch(WORKER_URL.replace(/\/$/,'')+path,{method:'POST',headers:{'x-admin-code':ADMIN||'','Content-Type':'application/json'},body:JSON.stringify(body||{})})
    .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); });
}

/* ---------- Utils ---------- */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fdate(s){ if(!s) return '—'; try{var d=new Date(s);return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}catch(e){return s;} }
function initials(f,l){return ((f||'?')[0]+''+((l||'')[0]||'')).toUpperCase();}
function warnBox(){ return workerOff ? '<div class="warn show">⚙️ Worker non configuré. Déploie <b>revolut-worker.js</b> sur Cloudflare et renseigne <b>WORKER_URL</b> ici et dans les autres pages pour afficher les données réelles.</div>' : ''; }

/* ---------- Chart SVG ---------- */
function barChart(data,labels){
  var w=100,h=100,n=data.length||1,max=Math.max(1,Math.max.apply(null,data));
  var bw=w/n*0.66, gap=w/n;
  var bars='',lbls='';
  for(var i=0;i<n;i++){
    var bh=(data[i]/max)*82, x=i*gap+(gap-bw)/2, y=90-bh;
    bars+='<rect class="bar" x="'+x.toFixed(2)+'" y="'+y.toFixed(2)+'" width="'+bw.toFixed(2)+'" height="'+bh.toFixed(2)+'" rx="1"><title>'+esc(labels[i])+' : '+data[i]+'</title></rect>';
    if(n<=12||i%Math.ceil(n/12)===0){ lbls+='<text class="axl" x="'+(i*gap+gap/2).toFixed(2)+'" y="98" text-anchor="middle">'+esc(labels[i])+'</text>'; }
  }
  return '<svg class="chart" viewBox="0 0 100 100" preserveAspectRatio="none"><defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0c060"/><stop offset="1" stop-color="#8a6a20"/></linearGradient></defs>'+bars+lbls+'</svg>';
}

/* ---------- Vues ---------- */
var days=10;

function route(){
  if(!ADMIN){ showGate(); return; }
  var h=location.hash||'#dashboard';
  if(h.indexOf('#client/')===0){ viewClient(h.slice(8)); }
  else if(h.indexOf('#visit/')===0){ viewVisit(h.slice(7)); }
  else if(h==='#clients'){ viewClients(); }
  else if(h==='#visits'){ viewVisits(); }
  else { viewDashboard(); }
}
window.addEventListener('hashchange',route);

function loading(){ app.innerHTML='<div class="spin"></div>'; }

/* ══════════ DIAGNOSTIC CONNEXIONS (Worker + Supabase) ══════════ */
function clog(msg,cls){ var c=$('#cons'); if(!c) return; c.style.display='block'; var d=document.createElement('div'); d.className='cl '+(cls||''); d.textContent=msg; c.appendChild(d); c.scrollTop=c.scrollHeight; }
function setPill(id,ok,txt){ var p=$('#'+id); if(!p) return; p.className='pill '+(ok?'ok':'ko'); p.textContent=txt; }
function wireDiag(){ var a=$('#btnCheck'); if(a)a.onclick=runQuickCheck; var b=$('#btnInit'); if(b)b.onclick=runInit; }

function runQuickCheck(){
  setPill('pillWorker',false,'…'); setPill('pillSupa',false,'…');
  fetch(WORKER_URL.replace(/\/$/,'')+'/').then(function(r){return r.json();}).then(function(j){
    setPill('pillWorker',!!(j&&j.ok),(j&&j.version)?('en ligne · '+j.version):'en ligne');
  }).catch(function(){ setPill('pillWorker',false,'injoignable'); });
  fetch(SUPABASE_URL+'/rest/v1/visits?select=id&limit=1',{headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON}})
    .then(function(r){ setPill('pillSupa',r.ok,r.ok?'connecté':('erreur '+r.status)); })
    .catch(function(){ setPill('pillSupa',false,'injoignable'); });
}

async function runInit(){
  var c=$('#cons'); if(c){ c.style.display='block'; c.innerHTML=''; }
  var W=WORKER_URL.replace(/\/$/,''); var okAll=true;
  clog('▶ Démarrage des tests…','info');
  try{ var r=await fetch(W+'/'); var j=await r.json(); if(j&&j.ok){ clog('✅ Worker en ligne · '+(j.version||'?'),'ok'); setPill('pillWorker',true,j.version||'en ligne'); } else throw 0; }
  catch(e){ okAll=false; clog('❌ Worker injoignable — vérifie l URL / le déploiement','ko'); setPill('pillWorker',false,'injoignable'); }

  try{ var r2=await fetch(W+'/admin/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:ADMIN})}); var j2=await r2.json();
       if(j2&&j2.ok){ clog('✅ Code admin valide','ok'); } else { okAll=false; clog('❌ Code admin refusé','ko'); } }
  catch(e){ okAll=false; clog('❌ /admin/verify injoignable','ko'); }

  try{ var r3=await fetch(SUPABASE_URL+'/rest/v1/visits',{method:'POST',headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({session_id:'diag',event:'diag',path:'diagnostic',referrer:'',ua:'admin-init'})});
       if(r3.ok){ clog('✅ Supabase écriture OK (clé publiable)','ok'); setPill('pillSupa',true,'connecté'); } else { okAll=false; clog('❌ Supabase écriture refusée ('+r3.status+') — table visits / RLS ?','ko'); setPill('pillSupa',false,'erreur'); } }
  catch(e){ okAll=false; clog('❌ Supabase injoignable','ko'); setPill('pillSupa',false,'injoignable'); }

  try{ var r4=await fetch(W+'/admin/stats?days=1',{headers:{'x-admin-code':ADMIN}}); var j4=await r4.json();
       if(r4.ok&&j4&&typeof j4.totalVisitors!=='undefined'){ clog('✅ Service key OK · '+j4.totalVisitors+' visiteur(s), '+j4.onlineNow+' en ligne','ok'); }
       else if(r4.status===403){ okAll=false; clog('❌ Code admin refusé côté worker','ko'); }
       else { okAll=false; clog('❌ SUPABASE_SERVICE_KEY manquante/invalide','ko'); } }
  catch(e){ okAll=false; clog('❌ /admin/stats injoignable','ko'); }

  try{ var r5=await fetch(W+'/admin/clients',{headers:{'x-admin-code':ADMIN}}); var j5=await r5.json();
       if(r5.ok&&j5&&j5.clients){ clog('✅ Lecture clients OK · '+j5.clients.length+' compte(s)','ok'); } else { okAll=false; clog('⚠️ Lecture clients KO','ko'); } }
  catch(e){ okAll=false; clog('⚠️ /admin/clients injoignable','ko'); }

  clog(okAll?'━━━ ✅ TOUT EST OPÉRATIONNEL ━━━':'━━━ ⚠️ Voir les ❌ ci-dessus ━━━', okAll?'ok':'ko');
}

function viewDashboard(){
  app.innerHTML =
    warnBox()+
    '<div class="kpis">'+
      '<div class="kpi live"><div class="n" id="kOnline">–</div><div class="l"><span class="dotlive"></span>En ligne maintenant</div></div>'+
      '<div class="kpi"><div class="n" id="kTotal">–</div><div class="l">Visiteurs uniques (total)</div></div>'+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-h"><span class="t">🔌 Connexions</span><button class="mini-btn" id="btnCheck">🔄 Vérifier</button></div>'+
      '<div class="conn-row"><span>Worker</span><span class="pill" id="pillWorker">…</span></div>'+
      '<div class="conn-row"><span>Supabase</span><span class="pill" id="pillSupa">…</span></div>'+
      '<button class="init-btn" id="btnInit">⚙️ Initialiser & tester (1re fois)</button>'+
      '<div class="console" id="cons" style="display:none"></div>'+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-h"><span class="t">📈 Vues par jour</span>'+
        '<div class="seg" id="seg"></div></div>'+
      '<div id="chartDay"></div>'+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-h"><span class="t">🕐 Heures de pointe</span></div>'+
      '<div id="chartHour"></div><div class="peak" id="peakTxt"></div>'+
    '</div>'+
    '<div class="acts">'+
      '<div class="act" onclick="location.hash=\'#clients\'"><div class="ai">👤</div><div class="at">Recherche client</div><div class="as">Comptes enregistrés</div></div>'+
      '<div class="act" onclick="location.hash=\'#visits\'"><div class="ai">📊</div><div class="at">Stats landing page</div><div class="as">Historique des visites</div></div>'+
    '</div>';
  var seg=$('#seg');
  [1,3,5,7,10].forEach(function(d){
    var b=document.createElement('button'); b.textContent=d+'j'; if(d===days)b.className='on';
    b.onclick=function(){ days=d; loadStats(); };
    seg.appendChild(b);
  });
  loadStats();
  wireDiag(); runQuickCheck();
}
function loadStats(){
  $('#seg')&&Array.prototype.forEach.call($('#seg').children,function(b){ b.className=(b.textContent===days+'j')?'on':''; });
  api('/admin/stats?days='+days).then(function(s){
    $('#kOnline').textContent=s.onlineNow||0;
    $('#kTotal').textContent=s.totalVisitors||0;
    var pd=s.perDay||[]; $('#chartDay').innerHTML=barChart(pd.map(function(x){return x.views;}),pd.map(function(x){return (x.date||'').slice(5);}));
    var ph=s.perHour||[]; var hv=[],hl=[]; for(var i=0;i<24;i++){var f=ph.find?ph.find(function(x){return x.hour===i;}):null; hv.push(f?f.views:0); hl.push(i);}
    $('#chartHour').innerHTML=barChart(hv,hl.map(function(x){return x+'h';}));
    var peak=0,pi=0; hv.forEach(function(v,i){ if(v>peak){peak=v;pi=i;} });
    $('#peakTxt').innerHTML = peak? ('Pic de trafic vers <b>'+pi+'h</b> ('+peak+' vues).') : 'Pas encore assez de données.';
  }).catch(function(e){
    $('#kOnline').textContent='0'; $('#kTotal').textContent='0';
    $('#chartDay').innerHTML='<div class="empty">'+(workerOff?'Worker requis pour les stats.':'Aucune donnée.')+'</div>';
    $('#chartHour').innerHTML='';
  });
}

function viewClients(){
  loading();
  api('/admin/clients').then(function(r){
    var cl=(r&&r.clients)||[];
    var html='<span class="back" onclick="location.hash=\'#dashboard\'">← Tableau de bord</span>'+
      '<div class="panel-h"><span class="t">👤 Clients inscrits</span><span class="count">'+cl.length+' compte(s)</span></div>';
    if(!cl.length){ html+='<div class="empty">Aucun client inscrit pour l\'instant.</div>'; }
    else{
      html+='<div class="list">';
      cl.forEach(function(c){
        html+='<div class="item" onclick="location.hash=\'#client/'+esc(c.id)+'\'">'+
          '<div class="av">'+esc(initials(c.first_name,c.last_name))+'</div>'+
          '<div class="it-main"><div class="a">'+esc((c.first_name||'')+' '+(c.last_name||''))+'</div>'+
          '<div class="b">'+esc(c.email||'')+' · '+esc(c.phone||'—')+'</div></div>'+
          '<div class="it-r">inscrit<br>'+fdate(c.created_at).split(' ')[0]+'</div></div>';
      });
      html+='</div>';
    }
    app.innerHTML=warnBox()+html;
  }).catch(function(e){
    app.innerHTML=warnBox()+'<span class="back" onclick="location.hash=\'#dashboard\'">← Retour</span><div class="empty">'+(workerOff?'Worker requis pour lister les clients (données protégées).':'Impossible de charger les clients.')+'</div>';
  });
}

function viewClient(id){
  loading();
  api('/admin/client?id='+encodeURIComponent(id)).then(function(r){
    var c=r.client||{}, pays=r.payments||[], vis=r.visits||[];
    var paid=pays.some(function(p){return p.status==='paid';});
    var html='<span class="back" onclick="location.hash=\'#clients\'">← Clients</span><div class="detail">'+
      '<h2>'+esc((c.first_name||'')+' '+(c.last_name||''))+'</h2>'+
      '<div class="sub">'+(paid?'✅ Client payant':'○ Compte créé (non payé)')+'</div>'+
      row('Email',c.email)+row('Téléphone',c.phone)+row('Code postal',c.postal_code)+
      row('Inscription',fdate(c.created_at))+row('Dernière connexion',fdate(c.last_sign_in_at))+row('ID',c.id)+
      '<div class="dsec">💳 Paiements ('+pays.length+')</div>'+
      (pays.length?pays.map(function(p){return row(fdate(p.created_at),(p.status==='paid'?'✅ payé':'⏳ '+p.status)+(p.payment_id?(' · '+p.payment_id):''));}).join(''):'<div class="drow"><span class="k">—</span><span class="v">aucun</span></div>')+
      '<div class="dsec">👣 Dernières activités ('+vis.length+')</div>'+
      (vis.length?vis.slice(0,10).map(function(v){return row(fdate(v.created_at),esc(v.path||'/'));}).join(''):'<div class="drow"><span class="k">—</span><span class="v">aucune</span></div>')+
      '</div>';
    app.innerHTML=html;
  }).catch(function(e){
    app.innerHTML='<span class="back" onclick="location.hash=\'#clients\'">← Clients</span><div class="empty">'+(workerOff?'Worker requis.':'Fiche introuvable.')+'</div>';
  });
}

function viewVisits(){
  loading();
  api('/admin/visits?limit=300').then(function(r){
    var vs=(r&&r.visits)||[];
    var html='<span class="back" onclick="location.hash=\'#dashboard\'">← Tableau de bord</span>'+
      '<div class="panel-h"><span class="t">📊 Connexions landing page</span><span class="count">'+vs.length+' visite(s)</span></div>';
    if(!vs.length){ html+='<div class="empty">Aucune visite enregistrée.</div>'; }
    else{
      html+='<div class="list" id="vlist">';
      vs.forEach(function(v){
        var uaShort=(v.ua||'').replace(/Mozilla\/5.0 ?/,'').slice(0,42);
        html+='<div class="item" data-id="'+esc(v.id)+'">'+
          '<div class="av">🌐</div>'+
          '<div class="it-main" onclick="location.hash=\'#visit/'+esc(v.id)+'\'"><div class="a">'+esc(v.path||'/')+'</div>'+
          '<div class="b">'+esc(uaShort||'inconnu')+(v.referrer?(' · '+esc(v.referrer.slice(0,24))):'')+'</div></div>'+
          '<div class="it-r">'+fdate(v.created_at)+'</div>'+
          '<button class="del" data-del="'+esc(v.id)+'">🗑</button></div>';
      });
      html+='</div>';
    }
    app.innerHTML=warnBox()+html;
    Array.prototype.forEach.call(document.querySelectorAll('[data-del]'),function(b){
      b.addEventListener('click',function(e){
        e.stopPropagation();
        if(!confirm('Supprimer cette visite ?')) return;
        var id=b.getAttribute('data-del'); b.textContent='…'; b.disabled=true;
        apiPost('/admin/visit-delete',{id:id}).then(function(){ var it=b.closest('.item'); if(it)it.remove(); })
          .catch(function(){ b.textContent='🗑'; b.disabled=false; alert('Suppression impossible (worker requis).'); });
      });
    });
  }).catch(function(e){
    app.innerHTML=warnBox()+'<span class="back" onclick="location.hash=\'#dashboard\'">← Retour</span><div class="empty">'+(workerOff?'Worker requis pour l\'historique.':'Impossible de charger l\'historique.')+'</div>';
  });
}

function viewVisit(id){
  loading();
  api('/admin/visits?limit=1000').then(function(r){
    var v=((r&&r.visits)||[]).find(function(x){return String(x.id)===String(id);});
    if(!v){ app.innerHTML='<span class="back" onclick="location.hash=\'#visits\'">← Historique</span><div class="empty">Visite introuvable.</div>'; return; }
    app.innerHTML='<span class="back" onclick="location.hash=\'#visits\'">← Historique</span><div class="detail">'+
      '<h2>Visite landing</h2><div class="sub">'+fdate(v.created_at)+'</div>'+
      row('Page',v.path)+row('Session',v.session_id)+row('Provenance',v.referrer||'directe')+row('Navigateur',v.ua)+row('ID',v.id)+
      '<div class="dsec">🔄 Sync Supabase</div><div class="drow"><span class="k">Statut</span><span class="v">stocké (prêt pour sync avancée)</span></div>'+
      '</div>';
  }).catch(function(){ app.innerHTML='<span class="back" onclick="location.hash=\'#visits\'">← Historique</span><div class="empty">Worker requis.</div>'; });
}

function row(k,v){ return '<div class="drow"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v==null||v===''?'—':v)+'</span></div>'; }

/* Auto-refresh "en ligne" toutes les 20s sur le dashboard */
setInterval(function(){ if((location.hash||'#dashboard')==='#dashboard' && ADMIN && !workerOff){ api('/admin/stats?days=1').then(function(s){ var k=$('#kOnline'); if(k)k.textContent=s.onlineNow||0; }).catch(function(){}); } },20000);

/* Démarrage */
if(!ADMIN){ showGate(); } else { route(); }

})();
</script>
